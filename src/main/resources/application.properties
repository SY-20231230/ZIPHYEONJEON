# =====================================================================
# [집현전 프로젝트] 통합 환경 설정 (Standardized for Team - Fix Ver.)
# =====================================================================

# 1. 기본 프로젝트 정보
spring.application.name=ZIPHYEONJEON
spring.profiles.include=local

# 2. 클라우드 및 보안 기본 설정 (팀원 환경 유지)
spring.cloud.config.enabled=false
# spring.config.import=optional:configserver:http://localhost:8888
spring.security.user.name=root
spring.security.user.password=1234

# 3. 데이터베이스 (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. JPA/Hibernate 설정 - 팀원 명명 전략 보존
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# 5. Redis 설정 - 동규님의 RTR 보안 엔진 필수 항목
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# 6. 앱 자체 보안 및 JWT 설정 - 동규님 코드 연동
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
jwt.secret=${JWT_SECRET}
app.jwt.access-token-validity=3600000
app.jwt.refresh-token-validity=1209600000

# 7. 로깅 및 서버 인코딩 설정
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

logging.level.root=INFO
logging.level.io.pjj.ziphyeonjeon=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=${LOG_PATH:./logs}/ziphyeonjeon.log

# =====================================================================
# [집현전 프로젝트] 외부 API 키 설정 (환경 변수 사용)
# =====================================================================

# 1. 공공데이터포털 관련 (부동산 실거래가, 재난 안전 데이터)
PUBLIC_DATA_SERVICE_KEY=${PUBLIC_DATA_SERVICE_KEY}
DISASTER_SERVICE_KEY=${DISASTER_SERVICE_KEY}

# 2. 네이버 클라우드 OCR 관련
NAVER_OCR_SERVICE_KEY=${NAVER_OCR_SERVICE_KEY}
NAVER_APIGW_INVOKE_URL=${NAVER_APIGW_INVOKE_URL}
NAVER_APIGW_API_KEY_ID=${NAVER_APIGW_API_KEY_ID}
NAVER_APIGW_API_KEY=${NAVER_APIGW_API_KEY}

# 3. 기타 지도 및 검색 API
VWORLD_API_KEY=${VWORLD_API_KEY}
SEOUL_OPENAPI_KEY=${SEOUL_OPENAPI_KEY}
KAKAO_API_KEY=${KAKAO_API_KEY}
GEMINI_API_KEY=${GEMINI_API_KEY}
